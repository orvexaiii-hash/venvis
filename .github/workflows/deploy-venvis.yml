name: Deploy VENVIS

on:
  push:
    branches: [master]
    paths:
      - 'venvis/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 31.97.21.155
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            set -e
            cd /var/www/venvis/venvis
            git pull origin master
            VENVIS_DIR=$([ -f venvis/Dockerfile ] && echo "./venvis" || echo ".")
            docker build --no-cache -t venvis:latest $VENVIS_DIR
            docker service update --force --image venvis:latest venvis_venvis
            echo "✓ VENVIS deployed at $(date)"
